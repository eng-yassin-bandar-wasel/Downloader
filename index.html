<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Sub Grabber Pro</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="panel">
                <div>
                    <h1>YT Sub Grabber Pro</h1>
                    <p class="muted-text">Download subtitles from videos and playlists with live progress feedback.</p>
                </div>

                <div class="control-group">
                    <label for="sub-lang">Subtitle Language</label>
                    <select id="sub-lang">
                        <option value="en">English</option>
                        <option value="ar">Arabic (العربية)</option>
                        <option value="fr">French</option>
                    </select>
                </div>

                <button id="btn-download" type="button">
                    <span id="btn-text">Download Subtitles</span>
                </button>
                <button id="btn-reload" type="button" class="secondary">
                    🔄 Reload YouTube
                </button>

                <div class="status-card">
                    <h2>Status</h2>
                    <div id="status-text" class="status-line status-normal">Ready to download.</div>
                    <div class="progress-bar" aria-hidden="true">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div class="progress-label">
                        <span id="progress-label-text">Waiting</span>
                        <span id="progress-percent">0%</span>
                    </div>
                </div>
            </div>
        </aside>

        <section class="browser-container">
            <div class="browser-header">
                <h2>Embedded YouTube Browser</h2>
                <span>Navigate to a video or playlist, then download subtitles.</span>
            </div>
            <webview id="yt-webview" src="https://www.youtube.com" partition="persist:yt-sub-grabber"></webview>
        </section>
    </div>

    <script>
        const webview = document.getElementById('yt-webview');
        const btnDownload = document.getElementById('btn-download');
        const btnReload = document.getElementById('btn-reload');
        const btnText = document.getElementById('btn-text');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const progressLabelText = document.getElementById('progress-label-text');
        const progressPercent = document.getElementById('progress-percent');

        const setStatus = (message, type = 'normal') => {
            statusText.innerText = message;
            statusText.className = `status-line status-${type}`;
        };

        const updateProgress = (percentText) => {
            const normalized = percentText.replace('%', '').trim();
            const numeric = Number(normalized);
            const width = Number.isFinite(numeric) ? `${Math.min(Math.max(numeric, 0), 100)}%` : percentText;
            progressFill.style.width = width;
            progressPercent.innerText = width;
            progressLabelText.innerText = width === '0%' ? 'Preparing' : 'Downloading';
        };

        const resetControls = () => {
            btnDownload.disabled = false;
            btnText.innerText = 'Download Subtitles';
        };

        const setWorking = () => {
            btnDownload.disabled = true;
            btnText.innerText = 'Downloading…';
        };

        const isSupportedUrl = (url) => {
            return /(?:youtube\.com\/(watch|playlist|shorts)|youtu\.be\/)/i.test(url);
        };

        const downloadCurrentVideo = () => {
            const currentUrl = webview.getURL();
            if (!isSupportedUrl(currentUrl)) {
                setStatus('⚠️ Please open a valid YouTube video or playlist.', 'error');
                return;
            }
            const subLang = document.getElementById('sub-lang').value;
            setWorking();
            setStatus('Extracting details and downloading subtitles…', 'normal');
            updateProgress('0%');
            window.electron.send('start-download', { url: currentUrl, lang: subLang });
        };

        btnDownload.addEventListener('click', downloadCurrentVideo);
        btnReload.addEventListener('click', () => webview.reload());

        window.electron.on('download-progress', (payload) => {
            if (payload && payload.percent) {
                setStatus(`Downloading… ${payload.percent}`,'normal');
                updateProgress(payload.percent);
            }
        });

        window.electron.on('download-complete', (message) => {
            resetControls();
            setStatus(message, 'success');
            updateProgress('100%');
        });

        window.electron.on('download-error', (message) => {
            resetControls();
            setStatus(`Error: ${message}`, 'error');
            updateProgress('0%');
        });

        window.electron.on('download-status', (message) => {
            if (message) {
                setStatus(message, 'normal');
            }
        });
    </script>
</body>
</html>
